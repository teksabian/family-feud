<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Team - Family Feud</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}?v={{ cache_bust }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #000;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid #ffd700;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 2em;
        }

        .info-box {
            background: rgba(255,215,0,0.2);
            border: 2px solid #ffd700;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: #fff;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffd700;
            border-radius: 8px;
            font-size: 1.1em;
            background: rgba(255,255,255,0.95);
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
            background: #fff;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #218838;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #ffd700;
            text-decoration: none;
            font-size: 1.1em;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; left: 20px; z-index: 100;">
        <a href="{{ url_for('host_dashboard') }}?v={{ cache_bust }}" class="back-link">← Back to Dashboard</a>
    </div>

    <div class="container">
        <div class="card">
            <h1>📋 Register Team</h1>

            <div class="info-box">
                Register a team code with a team name. This links the code on their paper answer sheet to their team so scanned answers get matched correctly.
            </div>

            <form method="POST" action="{{ url_for('register_team_submit') }}?v={{ cache_bust }}" onsubmit="return submitRegisterAjax(event, this)">
                <div class="form-group">
                    <label for="code">Team Code (written on their sheet):</label>
                    <select name="code" id="code" required>
                        <option value="">-- Select Team Code --</option>
                        {% for item in codes %}
                        <option value="{{ item.code }}">
                            {{ item.code }}{% if item.used %} - {{ item.team_name }}{% else %} (Available){% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="team_name">Team Name:</label>
                    <input type="text" name="team_name" id="team_name" required placeholder="Enter team name...">
                </div>

                <button type="submit">✅ Register Team</button>
            </form>
        </div>
    </div>

    <script>
        // Auto-fill team name when code is selected
        const teamCodeMap = {
            {% for item in codes %}
            '{{ item.code }}': {{ ('\"' + item.team_name|replace('"', '\\"') + '\"') if item.team_name else 'null' }},
            {% endfor %}
        };

        document.getElementById('code').addEventListener('change', function() {
            const teamName = teamCodeMap[this.value];
            const nameInput = document.getElementById('team_name');
            if (teamName) {
                nameInput.value = teamName;
            } else {
                nameInput.value = '';
            }
            nameInput.focus();
            nameInput.select();
        });

        async function submitRegisterAjax(event, form) {
            event.preventDefault();

            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ Registering...';

            try {
                const formData = new FormData(form);
                const response = await fetch(form.action, {
                    method: 'POST',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (typeof showToast === 'function') {
                        showToast(`✓ ${data.team_name} registered with code ${data.code}!`, 'success');
                    }

                    // Update the dropdown to show this code as used
                    const option = form.querySelector(`option[value="${data.code}"]`);
                    if (option) {
                        option.textContent = `${data.code} - ${data.team_name}`;
                    }
                    // Also update the JS map
                    teamCodeMap[data.code] = data.team_name;

                    // Reset form
                    form.reset();
                    document.getElementById('code').focus();
                } else {
                    if (typeof showToast === 'function') {
                        showToast(data.error || 'Registration failed', 'error');
                    }
                }
            } catch (error) {
                console.warn('[REGISTER] AJAX failed:', error);
                form.onsubmit = null;
                form.submit();
            }

            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
            return false;
        }
    </script>
    {% include '_toast.html' %}
</body>
</html>
